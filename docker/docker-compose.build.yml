services:
  db:
    build: ./postgres

  redis:
    build: ./redis

  celery:
    build:
      # Use project root as context to include wordlists/ and nuclei-templates/
      context: ..
      dockerfile: docker/celery/Dockerfile
      args:
        HOST_UID: ${HOST_UID}
        HOST_GID: ${HOST_GID}

  web:
    build:
      context: ./web
      args:
        HOST_UID: ${HOST_UID}
        HOST_GID: ${HOST_GID}

  proxy:
    build: ./proxy

  ollama:
    build: ./ollama
