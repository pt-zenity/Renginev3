id: aws-credentials-exposure

info:
  name: AWS Credentials Exposure
  author: rengine-ng
  severity: critical
  description: Detects exposed AWS credentials in common file locations
  tags: exposure,aws,credentials,cloud
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-200

http:
  - method: GET
    path:
      - "{{BaseURL}}/.aws/credentials"
      - "{{BaseURL}}/.aws/config"
      - "{{BaseURL}}/aws_credentials"
      - "{{BaseURL}}/aws.json"
      - "{{BaseURL}}/aws-credentials.txt"
      - "{{BaseURL}}/cloud_credentials"
      - "{{BaseURL}}/.cloud/credentials"

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "[default]"
          - "aws_access_key_id"
          - "aws_secret_access_key"
        condition: or

      - type: regex
        regex:
          - "AKIA[0-9A-Z]{16}"
          - "aws_access_key_id\\s*=\\s*[A-Z0-9]+"
          - "aws_secret_access_key\\s*=\\s*[A-Za-z0-9/+=]+"

      - type: word
        words:
          - "AWS_ACCESS_KEY_ID"
          - "AWS_SECRET_ACCESS_KEY"
        condition: or
