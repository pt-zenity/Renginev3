id: env-file-exposure
info:
  name: Environment File (.env) Exposure
  author: rengine-custom
  severity: critical
  description: |
    Detects exposed .env files that commonly contain sensitive environment variables
    such as database credentials, API keys, secret keys, and more.
  tags: exposure,env,config,sensitive,credentials
  reference:
    - https://owasp.org/www-project-top-ten/

http:
  - method: GET
    path:
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/.env.local"
      - "{{BaseURL}}/.env.production"
      - "{{BaseURL}}/.env.staging"
      - "{{BaseURL}}/.env.development"
      - "{{BaseURL}}/.env.dev"
      - "{{BaseURL}}/.env.prod"
      - "{{BaseURL}}/.env.test"
      - "{{BaseURL}}/.env.backup"
      - "{{BaseURL}}/.env.bak"
      - "{{BaseURL}}/.env.old"
      - "{{BaseURL}}/.env.example"
      - "{{BaseURL}}/.env.sample"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "DB_PASSWORD"
          - "DATABASE_URL"
          - "SECRET_KEY"
          - "API_KEY"
          - "APP_KEY"
          - "AWS_SECRET"
          - "REDIS_PASSWORD"
          - "SMTP_PASSWORD"
          - "MAIL_PASSWORD"
          - "STRIPE_SECRET"
          - "TWILIO_TOKEN"
          - "JWT_SECRET"
          - "TOKEN"
          - "PASSWORD"
          - "PASSWD"
          - "CREDENTIAL"
        part: body
        condition: or

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - "DB_PASSWORD=([^\n]+)"
          - "SECRET_KEY=([^\n]+)"
          - "API_KEY=([^\n]+)"
          - "APP_KEY=([^\n]+)"
          - "DATABASE_URL=([^\n]+)"
          - "REDIS_URL=([^\n]+)"
          - "AWS_SECRET_ACCESS_KEY=([^\n]+)"
